# ──────────────────────────────────────────────────────────────────
# Workflow de GitHub Actions
# ──────────────────────────────────────────────────────────────────
#
# Corre el script de ingesta cada hora. También se puede disparar
# manualmente desde la pestaña Actions del repo, lo cual es útil
# para probar y para forzar una corrida antes del próximo cron.
#
# Las credenciales (NOTION_TOKEN y NOTION_DATABASE_ID) se inyectan
# desde los Secrets del repo, no se exponen en el código.
# ──────────────────────────────────────────────────────────────────

name: Ingest Reguladores Financieros

on:
  # Cron: minuto 0 de cada hora (00:00, 01:00, 02:00...).
  # GitHub Actions tiene latencia de unos minutos, así que en la
  # práctica corre algunos minutos después de la hora en punto.
  schedule:
    - cron: '0 * * * *'

  # Permite disparar el workflow manualmente desde la UI de GitHub.
  # Esencial para el primer test y para forzar corridas.
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Necesitamos permission de escritura para que el workflow pueda
    # commitear y pushear el JSON exportado de vuelta al repo.
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ingest
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: python src/ingest.py

      # Después del ingest, el script generó docs/data/monitor.json.
      # Si cambió respecto al commit anterior, lo subimos al repo.
      # GitHub Pages lo va a servir automáticamente.
      - name: Commit JSON if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/monitor.json
          if git diff --staged --quiet; then
            echo "Sin cambios en el JSON, no se commitea."
          else
            git commit -m "auto: update monitor.json"
            git push
          fi
