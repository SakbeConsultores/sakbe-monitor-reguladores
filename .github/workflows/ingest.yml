# ──────────────────────────────────────────────────────────────────
# Workflow de GitHub Actions
# ──────────────────────────────────────────────────────────────────
#
# Corre el script de ingesta 2 veces al día (9 am y 3 pm CDMX).
# También se puede disparar manualmente desde la pestaña Actions del
# repo, lo cual es útil para probar y para forzar una corrida antes
# del próximo cron.
#
# Las credenciales (NOTION_TOKEN y NOTION_DATABASE_ID) se inyectan
# desde los Secrets del repo, no se exponen en el código.
# ──────────────────────────────────────────────────────────────────

name: Ingest Reguladores Financieros

on:
  # Cron: 2 veces al día, en horario laboral de CDMX (UTC-6).
  # GitHub Actions usa UTC, así que convertimos.
  # GitHub Actions tiene latencia de unos minutos, así que en la
  # práctica corre algunos minutos después del horario indicado.
  schedule:
    # 9:05 am CDMX = 15:05 UTC
    - cron: '5 15 * * *'
    # 3:05 pm CDMX = 21:05 UTC
    - cron: '5 21 * * *'

  # Permite disparar el workflow manualmente desde la UI de GitHub.
  # Esencial para el primer test y para forzar corridas.
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    # Subimos el timeout porque Playwright agrega ~2-3 minutos por la
    # descarga inicial de Chromium y los renderizados de cada sitio.
    timeout-minutes: 25

    # Necesitamos permission de escritura para que el workflow pueda
    # commitear y pushear el JSON exportado de vuelta al repo.
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Playwright necesita el binario de Chromium aparte del paquete pip.
      # Cacheamos en ~/.cache/ms-playwright para no re-descargar ~300 MB
      # cada corrida. El cache key incluye el hash de requirements.txt
      # para que se invalide automáticamente cuando subamos la versión.
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-chromium-${{ hashFiles('requirements.txt') }}

      # Si NO hay cache (primera corrida o cambió requirements):
      # instalamos browser + dependencias del SO. Toma 1-2 minutos.
      - name: Install Playwright browser + system deps (cache miss)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: playwright install --with-deps chromium

      # Si HAY cache: el binario está, pero las dependencias del SO no
      # persisten entre runners. Las instalamos rápido sin re-descargar
      # el browser. Toma ~15 segundos.
      - name: Install Playwright system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: playwright install-deps chromium

      - name: Run ingest
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: python src/ingest.py

      # Después del ingest, el script generó docs/data/monitor.json.
      # Si cambió respecto al commit anterior, lo subimos al repo.
      # GitHub Pages lo va a servir automáticamente.
      - name: Commit JSON if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/monitor.json
          if git diff --staged --quiet; then
            echo "Sin cambios en el JSON, no se commitea."
          else
            git commit -m "auto: update monitor.json"
            git push
          fi
