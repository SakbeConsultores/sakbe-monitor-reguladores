# ──────────────────────────────────────────────────────────────────
# Monitor de Reguladores Financieros - Sakbé Consultores
# ──────────────────────────────────────────────────────────────────
#
# Configuración de fuentes que el script de ingesta va a procesar.
# Para agregar un regulador nuevo, copia un bloque y ajusta sus campos.
#
# Campos por feed:
#   regulator      Nombre del regulador. Debe coincidir con una opción
#                  del select "Regulador" en Notion.
#   country        Código de país. Opciones: MX, CO, PE, US, EU, Global.
#                  Debe coincidir con una opción del select "Pais" en Notion.
#   type           Tipo/sección del feed. Debe coincidir con una opción
#                  del select "Tipo" en Notion.
#   url            URL del feed RSS, o de la página HTML para scraping.
#   source         "rss" si la URL es un feed RSS estándar.
#                  "scraper" si hay que parsear HTML.
#   scraper_module Solo si source es "scraper". Nombre del módulo Python
#                  dentro de src/scrapers/ que sabe parsear ese sitio.
#
# ──────────────────────────────────────────────────────────────────

# Configuración global del pipeline.
settings:
  # Solo se insertan items cuya fecha de publicación sea menor o igual
  # a este número de días. Items sin fecha se dejan pasar (no se filtran)
  # porque algunos feeds no entregan fecha y conviene errar del lado
  # de capturarlos. Sube o baja este número según necesites.
  max_age_days: 20

  # Ventana (en días) que se PUBLICA en docs/data/monitor.json y, por lo
  # tanto, lo que ve el dashboard web. Notion conserva el histórico
  # completo como archivo; aquí solo recortamos lo que se muestra para no
  # arrastrar meses de comunicados viejos. Items sin fecha se conservan.
  # Ajusta este número para probar distintas ventanas (10, 20, 30...).
  display_window_days: 20

feeds:

  # ═══════════════════════════ GLOBAL ═══════════════════════════

  - regulator: BIS
    country: Global
    type: Research
    url: https://www.bis.org/doclist/bis_fsi_publs.rss
    source: rss

  - regulator: BIS
    country: Global
    type: News
    url: https://www.bis.org/doclist/all_pressrels.rss
    source: rss

  - regulator: BIS
    country: Global
    type: Statistical Releases
    url: https://www.bis.org/doclist/all_statistics.rss
    source: rss

  - regulator: BIS
    country: Global
    type: Central Bank Research Hub
    url: https://www.bis.org/doclist/reshub_papers.rss
    source: rss

  - regulator: IMF
    country: Global
    type: News
    url: https://www.imf.org/en/news
    source: scraper
    scraper_module: imf_news

  - regulator: IMF
    country: Global
    type: Publications
    url: https://www.imf.org/en/publications
